<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imprimir Prova - Gerador de Provas</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #e2e8f0;
      color: #0f172a;
    }
    .toolbar {
      position: sticky; top: 0; z-index: 5;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 18px; background: #ffffff; border-bottom: 1px solid #cbd5e1;
      box-shadow: 0 1px 3px rgba(15,23,42,0.08);
    }
    .toolbar-title { font-weight: 900; font-size: 15px; }
    .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 9px 14px; border-radius: 10px; border: 1.5px solid #cbd5e1;
      background: white; color: #475569; text-decoration: none; cursor: pointer;
      font: inherit; font-size: 13px; font-weight: 800;
    }
    .btn.primary { background: #0f172a; border-color: #0f172a; color: white; }
    .page {
      width: min(100%, 842px);
      margin: 24px auto;
      background: #fff;
      box-shadow: 0 18px 50px rgba(15,23,42,0.16);
      padding: 40px;
    }
    .pv-header { display: flex; justify-content: space-between; gap: 20px; border-bottom: 4px solid #0f172a; padding-bottom: 18px; }
    .pv-kicker { font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em; color: #64748b; }
    .pv-school { font-size: 28px; font-weight: 900; margin: 6px 0 0; }
    .pv-title { font-size: 18px; font-weight: 800; margin: 6px 0 0; color: #334155; }
    .logo {
      width: 84px; height: 84px; border-radius: 18px; border: 2px dashed #cbd5e1;
      display: grid; place-items: center; font-size: 11px; color: #94a3b8;
      padding: 8px; text-align: center; background: #fff; overflow: hidden; flex: 0 0 auto;
    }
    .logo.has-image { border-style: solid; padding: 0; }
    .logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; }
    .infobox { border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; }
    .infobox .lbl { font-size: 11px; text-transform: uppercase; color: #64748b; letter-spacing: 0.12em; margin-bottom: 4px; }
    .infobox .val { font-weight: 700; font-size: 13px; color: #0f172a; }
    .student-grid { display: grid; grid-template-columns: 7fr 2fr 1fr 2fr; gap: 10px; margin-top: 10px; }
    .line { height: 22px; border-bottom: 1px solid #cbd5e1; }
    .instructions { margin-top: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; }
    .instructions .h { font-weight: 800; margin-bottom: 6px; }
    .nowrap { white-space: pre-line; }
    .chipbar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .chip { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 6px 10px; border-radius: 999px; font-size: 12px; color: #334155; }
    .questions { margin-top: 22px; display: grid; gap: 22px; }
    .question-block { break-inside: avoid; page-break-inside: avoid; }
    .qtitle { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
    .qtitle .n { font-size: 18px; font-weight: 900; }
    .qtitle .p { font-size: 13px; color: #64748b; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    @media print { .bncc-badge { display: none; } }
    .qtext { margin-top: 8px; font-size: 15px; line-height: 1.8; }
    .qpreview { margin-top: 10px; font-size: 15px; }
    .spacey { display: grid; gap: 8px; }
    .mark-grid.two-columns { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 18px; }
    .hline { height: 20px; border-bottom: 1px solid #cbd5e1; }
    .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .question-image { margin: 10px 0 12px; text-align: center; }
    .question-image.left { text-align: left; }
    .question-image.right { text-align: right; }
    .question-image.lado_esquerda { float: left; margin: 0 18px 10px 0; text-align: left; clear: left; }
    .question-image.lado_direita { float: right; margin: 0 0 10px 18px; text-align: right; clear: right; }
    .question-image.lado_esquerda img, .question-image.lado_direita img { max-height: 200px; }
    .qpreview { overflow: hidden; }
    .question-image img {

      object-fit: contain;
      border: 1px solid #e2e8f0;

    .question-image.small img { max-width: 35%; }

    .question-image.large img { max-width: 82%; }
    .question-image.full img { width: 100%; max-width: 100%; }
    .image-caption { margin-top: 6px; font-size: 12px; color: #64748b; font-style: italic; }
    .image-match-grid {

    }
    .match-images {
      display: grid;

    .texto-base-box { border-left: 4px solid #334155; background: #f8fafc; padding: 10px 14px; margin-bottom: 12px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
    .math-ops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 18px 24px; margin-top: 10px; }

    .silaba-word { font-weight: 800; letter-spacing: 0.08em; }
    .word-search-grid {

    .crossword-layout { display: grid; gap: 12px; }
    .crossword-grid { display: inline-grid; gap: 2px; padding: 6px; border: 1px solid #cbd5e1; background: #f8fafc; width: max-content; max-width: 100%; overflow: auto; }

    .crossword-clues { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 18px; font-size: 13px; }

    .seq-img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 8px; }
    .seq-img-card { border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px; text-align: center; break-inside: avoid; }
    .seq-img-card img { max-width: 100%; max-height: 90px; object-fit: contain; border-radius: 6px; }
    .seq-img-num { width: 32px; height: 32px; border: 2px solid #94a3b8; border-radius: 6px; margin: 6px auto 0; }
    .comparar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }

    .comparar-img img { max-width: 100%; max-height: 180px; object-fit: contain; border: 1px solid #e2e8f0; border-radius: 10px; padding: 4px; }

    .legenda-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; margin-top: 8px; }

    .grade-img-grid { display: grid; gap: 12px; margin-top: 8px; }

    .grade-img-grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grade-img-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px; text-align: center; break-inside: avoid; }
    .grade-img-card img { width: 100%; height: 110px; object-fit: contain; border-radius: 6px; display: block; }
    .grade-img-placeholder { height: 110px; border-radius: 6px; background: #f1f5f9; color: #94a3b8; display: grid; place-items: center; font-size: 12px; }
    .grade-img-caption { font-size: 12px; color: #334155; font-weight: 700; margin-top: 6px; }
    .grade-img-line { border-bottom: 1px solid #334155; height: 24px; margin-top: 8px; }
    .identify-image-wrap { position: relative; margin-top: 8px; display: inline-block; max-width: 100%; }
    .identify-image-wrap img { max-width: 100%; max-height: 360px; object-fit: contain; border: 1px solid #e2e8f0; border-radius: 8px; display: block; }
    .identify-image-placeholder { width: min(100%, 520px); height: 260px; border: 1px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; color: #94a3b8; display: grid; place-items: center; }
    .identify-marker { position: absolute; width: 26px; height: 26px; border-radius: 50%; background: #0f172a; color: #fff; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(15,23,42,.28); display: grid; place-items: center; font-size: 12px; font-weight: 900; transform: translate(-50%, -50%); }
    .identify-answer-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 16px; margin-top: 10px; }
    .identify-answer-item { display: grid; grid-template-columns: 28px 1fr; gap: 8px; align-items: end; font-size: 13px; }
    .identify-answer-num { width: 24px; height: 24px; border-radius: 50%; background: #0f172a; color: #fff; display: grid; place-items: center; font-weight: 900; font-size: 12px; }
    .identify-answer-line { border-bottom: 1px solid #334155; height: 24px; }
    .assoc-img-section { margin-top: 8px; }
    .assoc-img-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-bottom: 10px; }
    .assoc-img-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px; text-align: center; font-size: 13px; break-inside: avoid; }
    .assoc-img-card img { max-width: 100%; max-height: 80px; object-fit: contain; border-radius: 4px; }
    .assoc-img-blank { height: 24px; border-bottom: 2px solid #334155; margin-top: 4px; }
    .message { text-align: center; padding: 80px 20px; color: #64748b; }
    .message h1 { color: #0f172a; font-size: 22px; margin: 0 0 8px; }

      margin-top: 28px;
      border-top: 3px solid #0f172a;
      padding-top: 16px;
      break-before: page;
    }
    .answer-key h2 { font-size: 20px; margin-bottom: 12px; }
    .answer-grid { display: grid; gap: 8px; }
    .answer-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
    }
    @media (max-width: 700px) {
      .page { margin: 0; padding: 24px 18px; width: 100%; box-shadow: none; }
      .toolbar { align-items: flex-start; }
      .toolbar-actions { width: 100%; display: grid; grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .info-grid, .student-grid { grid-template-columns: 1fr; }
      .pv-header { align-items: flex-start; }
      .pv-school { font-size: 22px; }
    }
    @media (max-width: 430px) {
      .toolbar { display: grid; grid-template-columns: 1fr; }
      .page { padding: 18px 14px; }
      .pv-header { flex-direction: column; }

      .no-print { display: none !important; }
      .page { width: auto; margin: 0; padding: 0; box-shadow: none; }

      .question-block { margin: 0 0 20px; }
      .pv-header, .info-grid, .student-grid, .instructions, .question-block { break-inside: avoid; page-break-inside: avoid; }

</head>
<body>
  <div class="toolbar no-print">
    <div class="toolbar-title">Gerador de Provas</div>
    <div class="toolbar-actions">
      <a class="btn" href="dashboard.html">Minhas Provas</a>
      <button class="btn" type="button" id="answerKeyBtn">Com gabarito</button>
      <button class="btn primary" type="button" onclick="window.print()">Imprimir / PDF</button>
    </div>
  </div>

  <main id="root" class="page">
    <div class="message">
      <h1>Carregando prova...</h1>
      <p>Aguarde um instante.</p>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const STORAGE_KEY_BASE = 'gerador-provas-state-v1';

    function esc(s) {
      return String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function normalizeRelacioneQuestion(q) {
      if (!q || q.type !== 'relacione') return q;
      if (!Array.isArray(q.pairs) || q.pairs.length === 0) {
        const left = Array.isArray(q.left) ? q.left : ['', '', '', ''];
        const right = Array.isArray(q.right) ? q.right : ['', '', '', ''];
        const size = Math.max(left.length, right.length, 2);
        q.pairs = Array.from({ length: size }).map((_, i) => ({
          left: left[i] || '',
          right: right[i] || '',
        }));
      }
      q.pairs = q.pairs.map((pair) => {
        if (typeof pair === 'string') return { left: pair, right: '' };
        if (!pair || typeof pair !== 'object') return { left: '', right: '' };
        if (typeof pair.left !== 'string') pair.left = '';
        if (typeof pair.right !== 'string') pair.right = '';
        return pair;
      });
      const validOrder = Array.isArray(q.rightOrder)
        && q.rightOrder.length === q.pairs.length
        && q.rightOrder.every((n) => Number.isInteger(n) && n >= 0 && n < q.pairs.length)
        && new Set(q.rightOrder).size === q.pairs.length;
      if (!validOrder) {
        q.rightOrder = q.pairs.map((_, i) => i);
      }
      return q;
    }
    function relacioneAnswer(q) {
      normalizeRelacioneQuestion(q);
      return q.pairs
        .map((_, i) => {
          const pos = q.rightOrder.indexOf(i);
          return pos >= 0 ? `${i + 1}-${String.fromCharCode(65 + pos)}` : '';
        })
        .filter(Boolean)
        .join('; ');
    }
    function normalizeLacunasQuestion(q) {
      if (!q || q.type !== 'lacunas') return q;
      const legacyAnswers = Array.isArray(q.answers) ? q.answers : [];
      if (!Array.isArray(q.items) || q.items.length === 0) {
        const legacyText = String(q.text || '').trim();
        q.items = legacyText && legacyText.includes('_')
          ? [{ text: legacyText, answer: legacyAnswers[0] || '' }]
          : [{ text: '', answer: legacyAnswers[0] || '' }];
        if (legacyText && legacyText.includes('_')) {
          q.text = 'Complete as lacunas.';
        }
      }
      q.items = q.items.map((item, i) => {
        if (typeof item === 'string') return { text: item, answer: legacyAnswers[i] || '' };
        if (!item || typeof item !== 'object') return { text: '', answer: legacyAnswers[i] || '' };
        if (typeof item.text !== 'string') item.text = '';
        if (typeof item.answer !== 'string') item.answer = legacyAnswers[i] || '';
        return item;
      });
      q.answers = q.items.map((item) => item.answer);
      return q;
    }
    function normalizeRelacioneImagensQuestion(q) {
      if (!q || q.type !== 'relacione_imagens') return q;
      if (!Array.isArray(q.pairs) || q.pairs.length === 0) {
        q.pairs = [
          { imageDataUrl: '', imageFileName: '', word: '' },
          { imageDataUrl: '', imageFileName: '', word: '' },
        ];
      }
      q.pairs = q.pairs.map((pair) => ({
        imageDataUrl: pair?.imageDataUrl || '',
        imageFileName: pair?.imageFileName || '',
        word: pair?.word || '',
      }));
      const validOrder = Array.isArray(q.wordOrder)
        && q.wordOrder.length === q.pairs.length
        && q.wordOrder.every((n) => Number.isInteger(n) && n >= 0 && n < q.pairs.length)
        && new Set(q.wordOrder).size === q.pairs.length;
      if (!validOrder) {
        q.wordOrder = q.pairs.map((_, i) => i);
      }
      return q;
    }
    function relacioneImagensAnswer(q) {
      normalizeRelacioneImagensQuestion(q);
      return q.pairs
        .map((_, i) => {
          const pos = q.wordOrder.indexOf(i);
          return pos >= 0 ? `${i + 1}-${String.fromCharCode(65 + pos)}` : '';
        })
        .filter(Boolean)
        .join('; ');
    }
    function normalizePuzzleWord(word) {
      return String(word || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^A-Za-z]/g, '').toUpperCase();
    }
    function puzzleWordsFromText(text) {
      return String(text || '').split(/[\n,;]+/).map((word) => word.trim()).filter(Boolean);
    }
    function buildWordSearch(words, size = 12) {
      const cleanWords = words.map(normalizePuzzleWord).filter(Boolean);
      const gridSize = Math.max(8, Math.min(18, Number(size) || 12));
      const grid = Array.from({ length: gridSize }, () => Array.from({ length: gridSize }, () => ''));
      const placements = [];
      const directions = [{ dr: 0, dc: 1 }, { dr: 1, dc: 0 }, { dr: 1, dc: 1 }];
      cleanWords.forEach((word, wi) => {
        const trimmed = word.slice(0, gridSize);
        let placed = false;

              const crossRow = base.row + (base.dir === 'V' ? bi : 0);

        const markers = Array.isArray(q.markers) && q.markers.length ? q.markers : [];
        const markerHtml = markers.map((marker, i) => {
          const x = Math.max(0, Math.min(100, Number(marker.x) || 50));
          const y = Math.max(0, Math.min(100, Number(marker.y) || 50));
          return `<span class="identify-marker" style="left:${x}%;top:${y}%;">${i + 1}</span>`;
        }).join('');
        const image = q.imageDataUrl
          ? `<div class="identify-image-wrap"><img src="${q.imageDataUrl}" alt="${esc(q.imageFileName || 'Imagem para identificar')}" />${markerHtml}</div>`
          : `<div class="identify-image-wrap"><div class="identify-image-placeholder">Imagem não selecionada</div>${markerHtml}</div>`;
        const caption = q.imageCaption ? `<div class="image-caption">${esc(q.imageCaption)}</div>` : '';
        const list = q.showAnswerList === false ? '' : `<div class="identify-answer-list">${markers.map((marker, i) => `
          <div class="identify-answer-item"><span class="identify-answer-num">${i + 1}</span><span class="identify-answer-line"></span></div>
        `).join('')}</div>`;
        return `${image}${caption}${list}`;
      }
      if (q.type === 'associacao_imagem_imagem') {
        const left = q.leftItems||[]; const right = q.rightItems||[];
        const order = Array.isArray(q.rightOrder)&&q.rightOrder.length===right.length ? q.rightOrder : right.map((_,i)=>i);
        const mkCard = (item, label) => {
          const img = item&&item.imageDataUrl ? `<img src="${item.imageDataUrl}" alt="${esc(item.imageFileName||'')}" />` : `<div style="height:70px;background:#f1f5f9;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#94a3b8;">Sem imagem</div>`;
          return `<div class="assoc-img-card">${img}<div style="margin-top:4px;font-weight:700;">${esc(label)}</div><div class="assoc-img-blank"></div></div>`;
        };
        const leftCards = left.map((item,i)=>mkCard(item,String.fromCharCode(65+i))).join('');
        const rightCards = order.map((ri,i)=>mkCard(right[ri],String(i+1))).join('');
        return `<div class="assoc-img-section"><div style="font-size:12px;color:#64748b;margin-bottom:4px;">Referência:</div><div class="assoc-img-row">${leftCards}</div><div style="font-size:12px;color:#64748b;margin-bottom:4px;">Escreva a letra:</div><div class="assoc-img-row">${rightCards}</div></div>`;
      }
      return '';
    }

    function getQuestionAnswer(q) {
      if (q.type === 'multipla' && Number.isInteger(q.correctOption)) {
        return String.fromCharCode(65 + q.correctOption);
      }
      if (q.type === 'vf' && Array.isArray(q.items)) {
        const answers = q.items
          .map((item, i) => item.answer ? `${i + 1}-${item.answer}` : '')
          .filter(Boolean);
        return answers.join('; ');
      }
      if (q.type === 'marcarx' && Array.isArray(q.items)) {
        const answers = q.items
          .map((item, i) => {
            const checked = typeof item === 'string' ? false : !!item.checked;
            return checked ? String(i + 1) : '';
          })
          .filter(Boolean);
        return answers.join(', ');
      }
      if (q.type === 'relacione') {
        return relacioneAnswer(q);
      }
      if (q.type === 'lacunas') {
        normalizeLacunasQuestion(q);
        return q.items
          .map((item, i) => item.answer ? `${i + 1}-${item.answer}` : '')
          .filter(Boolean)
          .join('; ');
      }
      if (q.type === 'imagem' && q.imageAnswerType === 'multipla' && Number.isInteger(q.correctOption)) {
        return String.fromCharCode(65 + q.correctOption);
      }
      if (q.type === 'imagem' && q.imageAnswerType === 'marcarx' && Array.isArray(q.items)) {
        return q.items
          .map((item, i) => {
            const checked = typeof item === 'string' ? false : !!item.checked;
            return checked ? String(i + 1) : '';
          })
          .filter(Boolean)
          .join(', ');
      }
      if (q.type === 'interpretacao_imagem') {
        return '(interpretação de imagem — corrija manualmente)';
      }
      if (q.type === 'relacione_imagens') {
        return relacioneImagensAnswer(q);
      }
      if (q.type === 'texto_base' && q.answerType === 'multipla' && Number.isInteger(q.correctOption)) {
        return String.fromCharCode(65 + q.correctOption);
      }
      if (q.type === 'ditado' && q.wordList && q.wordList.trim()) {
        return q.wordList.split('\n').map(w => w.trim()).filter(Boolean).join(', ');
      }
      if (q.type === 'ordenacao' && Array.isArray(q.items) && q.items.length) {
        const ordered = [...q.items].sort((a, b) => (a.order || 0) - (b.order || 0));
        return ordered.map((it, i) => `${i + 1}. ${it.text || '?'}`).join(' → ');
      }
      if (q.type === 'associacao_setas' && Array.isArray(q.leftItems) && Array.isArray(q.rightItems)) {
        const right = Array.isArray(q.rightOrder)
          ? q.rightOrder.map(i => q.rightItems[i] || '?')
          : q.rightItems;
        return q.leftItems.map((l, i) => `${l} → ${q.rightItems[i] || '?'}`).join('; ');
      }
      if (q.type === 'sequencia_numerica' && Array.isArray(q.sequences)) {
        return q.sequences.map((s, i) => `${i + 1}: ${s.answer || '?'}`).join('; ');
      }
      if (q.type === 'silabas' && Array.isArray(q.words)) {
        return q.words.map(w => `${w.word}: ${w.answer || '?'}`).join('; ');
      }
      if (q.type === 'caca_palavras') {
        const words = puzzleWordsFromText(q.wordsText || q.wordList || '').map(normalizePuzzleWord).filter(Boolean);
        const placements = buildWordSearch(words, q.gridSize || 12).placements.join(' | ');
        return placements || words.join(', ');
      }
      if (q.type === 'cruzadinha' && Array.isArray(q.clues)) {
        return buildCrossword(q.clues, q.crosswordSeed || 0).placed.map((item) => `${item.number}. ${item.answer}`).join('; ');
      }
      if (q.type === 'sequencia_imagens' && Array.isArray(q.images)) {
        const order = Array.isArray(q.correctOrder)
          ? q.correctOrder.map((i, pos) => `${pos + 1}→${i + 1}`).join(', ')
          : q.images.map((_, i) => String(i + 1)).join(', ');
        return `Ordem: ${order}`;
      }
      if (q.type === 'legenda_imagens' && Array.isArray(q.images)) {
        return q.images.map((img, i) => `${i + 1}: ${img.legend || '?'}`).join('; ');
      }
      if (q.type === 'grade_imagens' && Array.isArray(q.items)) {
        const answers = q.items
          .map((item, i) => item.answer ? `${i + 1}: ${item.answer}` : '')
          .filter(Boolean);
        return answers.length ? answers.join('; ') : '(grade de imagens - corrija manualmente)';
      }
      if (q.type === 'identificar_imagem' && Array.isArray(q.markers)) {
        const answers = q.markers
          .map((item, i) => item.answer ? `${i + 1}: ${item.answer}` : '')
          .filter(Boolean);
        return answers.length ? answers.join('; ') : '(identificação de imagem - corrija manualmente)';
      }
      if (q.type === 'associacao_imagem_imagem' && Array.isArray(q.pairs)) {
        return q.pairs.map((p, i) => `${i + 1}: ${p.word || '?'}`).join('; ');
      }
      return '';
    }

    function renderAnswerKey(questions) {
      const rows = questions
        .map((q, i) => ({ number: i + 1, answer: getQuestionAnswer(q) }))
        .filter((item) => item.answer);
      if (!rows.length) return '';
      return `
        <section class="answer-key">
          <h2>Gabarito</h2>
          <div class="answer-grid">
            ${rows.map((item) => `<div class="answer-row"><strong>Questão ${item.number}</strong><span>${esc(item.answer)}</span></div>`).join('')}
          </div>
        </section>
      `;
    }

    function normalizeExam(exam) {
      if (exam.school) {
        return {
          title: exam.school.examTitle,
          school_name: exam.school.schoolName,
          subject: exam.school.subject,
          teacher: exam.school.teacher,
          class_name: exam.school.className,
          term: exam.school.term,
          date: exam.school.date,
          total_value: exam.school.totalValue,
          instructions: exam.school.instructions,
          questions: exam.questions || [],
          logo_data_url: exam.logoDataUrl || '',
        };
      }
      return exam;
    }

    function renderExam(rawExam) {
      const exam = normalizeExam(rawExam);
      const questions = Array.isArray(exam.questions) ? exam.questions : [];
      const showAnswerKey = new URLSearchParams(window.location.search).get('gabarito') === '1';
      const sum = questions.reduce((acc, q) => acc + parsePtNumber(q.points), 0);
      const logo = exam.logo_data_url
        ? `<div class="logo has-image"><img src="${exam.logo_data_url}" alt="Logo da escola" /></div>`
        : '<div class="logo" style="display:flex;align-items:center;justify-content:center;font-size:11px;color:#cbd5e1;border:1px dashed #e2e8f0;border-radius:8px;">Logo</div>';

      document.title = `${exam.title || 'Prova'} - Impressão`;
      document.getElementById('root').innerHTML = `
        <div class="pv-header">
          <div>
            <div class="pv-kicker">Prova escolar</div>
            <div class="pv-school">${esc(exam.school_name || 'Nome da Escola')}</div>
            <div class="pv-title">${esc(exam.title || 'Avaliação')}</div>
          </div>
          ${logo}
        </div>
        <div class="info-grid">
          <div class="infobox"><div class="lbl">Disciplina</div><div class="val">${esc(exam.subject || 'Disciplina')}</div></div>
          <div class="infobox"><div class="lbl">Professor(a)</div><div class="val">${esc(exam.teacher || 'Professor(a)')}</div></div>
          <div class="infobox"><div class="lbl">Turma</div><div class="val">${esc(exam.class_name || 'Turma')}</div></div>
          <div class="infobox"><div class="lbl">Bimestre/Etapa</div><div class="val">${esc(exam.term || 'Etapa')}</div></div>
        </div>
        <div class="student-grid">
          <div class="infobox"><div class="lbl">Aluno(a)</div><div class="line"></div></div>
          <div class="infobox"><div class="lbl">Data</div><div class="val">${esc(exam.date || '____/____/______')}</div></div>
          <div class="infobox"><div class="lbl">Nota</div><div class="line"></div></div>
          <div class="infobox"><div class="lbl">Valor</div><div class="val">${esc(exam.total_value || '0,0')}</div></div>
        </div>
        <div class="instructions">
          <div class="h">Instruções</div>
          <div class="nowrap">${esc(exam.instructions || '')}</div>
        </div>
        <div class="questions">
          ${questions.map((q, i) => `
            <div class="question-block">
              <div class="qtitle">
                <div class="n">Questão ${i + 1}</div>
                <div class="p">Valor: ${esc(q.points)}${q.bncc ? ` <span class="bncc-badge">${esc(q.bncc)}</span>` : ''}</div>
              </div>
              <div class="qtext">${esc(q.text || 'Digite o enunciado da questão.')}</div>
              <div class="qpreview">${renderQuestionPreview(q)}</div>
            </div>
          `).join('')}
        </div>
        ${showAnswerKey ? renderAnswerKey(questions) : ''}
      `;
    }

    function showMessage(title, text) {
      document.getElementById('root').innerHTML = `<div class="message"><h1>${esc(title)}</h1><p>${esc(text)}</p></div>`;
    }

    async function loadExam() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) {
        const auth = initAuthManager();
        const userKey = auth?.isAuthenticated() ? `${STORAGE_KEY_BASE}:${auth.getCurrentUser().id}` : STORAGE_KEY_BASE;
        const raw = localStorage.getItem(userKey) || localStorage.getItem(STORAGE_KEY_BASE);
        if (!raw) {
          showMessage('Nenhuma prova local encontrada', 'Abra uma prova no editor ou escolha uma prova salva no dashboard.');
          return;
        }
        renderExam(JSON.parse(raw));
        return;
      }

      const auth = initAuthManager();
      if (!auth || !auth.isAuthenticated()) {
        localStorage.setItem('editExamId', id);
        window.location.href = 'login.html';
        return;
      }

      const data = await auth.authenticatedRequest(`/exams?id=eq.${id}&select=*`);
      if (!Array.isArray(data) || !data[0]) {
        showMessage('Prova não encontrada', 'Verifique se você está na conta correta.');
        return;
      }
      renderExam(data[0]);
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('answerKeyBtn').addEventListener('click', () => {
        const url = new URL(window.location.href);
        if (url.searchParams.get('gabarito') === '1') url.searchParams.delete('gabarito');
        else url.searchParams.set('gabarito', '1');
        window.location.href = url.toString();
      });
      loadExam().catch((err) => showMessage('Erro ao carregar prova', err.message));
    });
  </script>
</body>
