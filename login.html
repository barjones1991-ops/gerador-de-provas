<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Gerador de Provas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      max-width: 420px;
      width: 100%;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 26px; font-weight: 900; color: #1e293b; }
    .logo p { margin: 6px 0 0; color: #64748b; font-size: 14px; }
    .tab-row {
      display: grid; grid-template-columns: 1fr 1fr;
      background: #f1f5f9; border-radius: 12px;
      padding: 4px; gap: 4px; margin-bottom: 28px;
    }
    .tab {
      padding: 10px; text-align: center; border-radius: 9px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      color: #64748b; transition: all 0.2s; border: none; background: transparent;
    }
    .tab.active { background: white; color: #667eea; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 12px;
      font-size: 14px; transition: border-color 0.2s; outline: none;
      font-family: inherit;
    }
    input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
    .field-error { color: #dc2626; font-size: 12px; margin-top: 5px; display: none; }
    .field-error.show { display: block; }
    .btn-submit {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; margin-top: 8px; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.35); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .alert {
      padding: 12px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 500; margin-bottom: 16px; display: none;
    }
    .alert.show { display: block; }
    .alert.success { background: #dcfce7; color: #166534; }
    .alert.error { background: #fee2e2; color: #991b1b; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 13px; color: #94a3b8; text-decoration: none;
    }
    .back-link:hover { color: #667eea; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>📝 Gerador de Provas</h1>
      <p>Plataforma para Professores</p>
    </div>

    <div class="tab-row">
      <button class="tab active" id="tabLogin" onclick="setMode('login')">Entrar</button>
      <button class="tab" id="tabSignup" onclick="setMode('signup')">Criar conta</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="authForm" novalidate>
      <div class="form-group">
        <label>E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" />
        <div class="field-error" id="emailError"></div>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        <div class="field-error" id="passwordError"></div>
      </div>
      <div class="form-group" id="nameGroup" style="display:none;">
        <label>Nome completo</label>
        <input id="name" type="text" placeholder="João Silva" autocomplete="name" />
        <div class="field-error" id="nameError"></div>
      </div>
      <div class="form-group" id="schoolGroup" style="display:none;">
        <label>Nome da escola</label>
        <input id="school" type="text" placeholder="Escola Municipal XYZ" autocomplete="off" />
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Entrar</button>
    </form>

    <a href="index.html" class="back-link">← Voltar ao início</a>
  </div>

  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let isLogin = true;
    let auth = null;

    document.addEventListener('DOMContentLoaded', () => {
      auth = initAuthManager();
      if (auth && auth.isAuthenticated()) {
        window.location.href = 'dashboard.html';
      }
    });

    function setMode(mode) {
      isLogin = (mode === 'login');
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabSignup').classList.toggle('active', !isLogin);
      document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
      document.getElementById('schoolGroup').style.display = isLogin ? 'none' : 'block';
      document.getElementById('submitBtn').textContent = isLogin ? 'Entrar' : 'Criar conta';
      document.getElementById('name').required = !isLogin;
      clearAlerts();
      document.getElementById('authForm').reset();
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert show ${type}`;
    }

    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }

    function clearAlerts() {
      document.getElementById('alertBox').className = 'alert';
      document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show'));
    }

    function setLoading(on) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = on;
      btn.innerHTML = on
        ? '<div class="spinner"></div> Aguarde...'
        : (isLogin ? 'Entrar' : 'Criar conta');
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();

      if (!auth) {
        showAlert('Erro: sistema não inicializado. Recarregue a página.', 'error');
        return;
      }

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value.trim();
      const school = document.getElementById('school').value.trim();

      if (!email) { showFieldError('emailError', 'E-mail obrigatório'); return; }
      if (!password || password.length < 6) { showFieldError('passwordError', 'Senha deve ter ao menos 6 caracteres'); return; }
      if (!isLogin && !name) { showFieldError('nameError', 'Nome obrigatório'); return; }

      setLoading(true);

      try {
        if (isLogin) {
          const result = await auth.signIn(email, password);
          if (!result.success) {
            showAlert(traduzirErro(result.error), 'error');
            return;
          }
          showAlert('✓ Login realizado! Redirecionando...', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1200);
        } else {
          const result = await auth.signUp(email, password, { full_name: name, school_name: school });
          if (!result.success) {
            showAlert(traduzirErro(result.error), 'error');
            return;
          }
          // Login automático após cadastro
          const loginResult = await auth.signIn(email, password);
          if (loginResult.success) {
            showAlert('✓ Conta criada! Redirecionando...', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1200);
          } else {
            showAlert('✓ Conta criada! Faça login para continuar.', 'success');
            setMode('login');
          }
        }
      } catch (err) {
        showAlert(traduzirErro(err.message), 'error');
      } finally {
        setLoading(false);
      }
    });

    function traduzirErro(msg) {
      if (!msg) return 'Erro desconhecido. Tente novamente.';
      if (msg.includes('Invalid login')) return 'E-mail ou senha incorretos.';
      if (msg.includes('already registered')) return 'Este e-mail já está cadastrado.';
      if (msg.includes('Password should be')) return 'A senha deve ter pelo menos 6 caracteres.';
      if (msg.includes('Unable to validate')) return 'E-mail inválido.';
      if (msg.includes('Email not confirmed')) return 'Confirme seu e-mail antes de entrar.';
      return msg;
    }
  </script>
</body>
</html>
